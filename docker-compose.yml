version: "3.9"

services:

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: futures_bot_api
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      SCAN_INTERVAL_SECONDS: 60
      MAX_CONCURRENT_SYMBOLS: 8
      MAX_SYMBOLS: 40
      # REDIS_URL: redis://redis:6379/0   # uncomment if you add redis service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: futures_bot_ui
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

  # ── Redis (optional, for caching) ────────────────────────────────────────────
